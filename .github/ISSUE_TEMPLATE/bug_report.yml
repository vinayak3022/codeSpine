name: Bug report
description: Report a reproducible bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.2"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14.5"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command run
      placeholder: "gindex analyse /path/to/project"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs/traceback
      render: shell
    validations:
      required: false
